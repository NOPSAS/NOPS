# nops.no / ByggSjekk – Nginx reverse proxy
# Håndterer: SSL-terminering, reverse proxy til api:8000 og web:3000, statiske filer, sikkerhetshoder

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=120r/m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name nops.no www.nops.no;
        return 301 https://$host$request_uri;
    }

    # HTTPS – nops.no (frontend)
    server {
        listen 443 ssl http2;
        server_name nops.no www.nops.no;

        ssl_certificate /etc/letsencrypt/live/nops.no/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nops.no/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Sikkerhetshoder
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: blob: https://cache.kartverket.no https://*.kartverket.no https://images.finncdn.no https://*.fal.ai https://*.replicate.delivery https://replicate.delivery; connect-src 'self' https://api.anthropic.com https://*.fal.ai https://*.fal.run https://api.replicate.com; frame-ancestors 'none';" always;

        # Frontend (Next.js)
        location / {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # API
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 30s;
            client_max_body_size 50M;
        }

        # Stripe webhook – ingen rate limit
        location /api/v1/billing/webhook {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /health {
            proxy_pass http://api:8000/health;
            access_log off;
        }
    }
}
