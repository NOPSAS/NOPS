# Produksjons-override for docker-compose.yml
# Bruk: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: "3.9"

services:
  api:
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  web:
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - web
    networks:
      - byggsjekk-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  db:
    ports: []  # ikke eksponer DB i prod
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    ports: []  # ikke eksponer Redis i prod

  minio:
    ports:
      - "9000:9000"  # behold API-porten for S3-kompatibilitet

volumes:
  nginx_logs:
